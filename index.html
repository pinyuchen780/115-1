<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動線上簽到</title>
    <script src="https://static.line-scdn.net/liff/edge/versions/2.21.4/sdk.js"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h2>歡迎參加活動！</h2>
        
        <div id="user-info" style="display:none;">
            <img id="user-avatar" src="" width="100" style="border-radius: 50%; border: 2px solid #06C755;"><br>
            <p style="font-size: 18px; margin: 15px 0;">你好，<strong id="user-name"></strong>！</p>
            <button id="checkin-btn" style="background-color: #06C755; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold;">確認簽到</button>
        </div>
        
        <p id="status" style="color: #666;">正在初始化系統...</p>
    </div>

    <script>
        // 🔒 你的專屬設定資料（已安全放入 script 標籤內）
        const liffId = '2010103818-559ZrQFC'; 
        const gasUrl = 'https://script.google.com/macros/s/AKfycbw-T6TNfuaPiQRbnSf6ET4fTeH6mEgu9IGN4ylS6C529-mdGMOPtvIIylkGwiCK9lEW/exec'; 

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        async function initLIFF() {
            try {
                if (typeof liff === 'undefined') {
                    updateStatus('SDK 載入失敗，請重新整理');
                    return;
                }

                // 修正後的寫法
await liff.init({ 
    liffId: liffId,
    withLoginOnResponse: true // 關鍵：強迫自動處理登入回應，防範 code_verifier 錯誤
});
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    showUserInfo(profile);
                }
            } catch (error) {
                updateStatus('初始化失敗: ' + error.message);
            }
        }

        function showUserInfo(profile) {
            document.getElementById('status').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('user-name').innerText = profile.displayName;
            document.getElementById('user-avatar').src = profile.pictureUrl;

            document.getElementById('checkin-btn').onclick = () => {
                sendCheckInData(profile.userId, profile.displayName);
            };
        }

        async function sendCheckInData(userId, displayName) {
    document.getElementById('checkin-btn').disabled = true;
    document.getElementById('checkin-btn').style.backgroundColor = '#ccc';
    document.getElementById('checkin-btn').innerText = '簽到中...';

    try {
        // ⭕ 關鍵修改：改用 URLSearchParams 封裝資料，對齊後端的 e.parameter
        const formData = new URLSearchParams();
        formData.append('userId', userId);
        formData.append('name', displayName);

        const response = await fetch(gasUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded' // 告訴 GAS 這是表單資料
            },
            body: formData.toString()
        });
        
        const result = await response.json();
        if (result.status === 'success') {
            alert('🎉 簽到成功！');
            liff.closeWindow(); // 成功後關閉視窗
        } else {
            alert('簽到失敗：' + result.message);
            resetButton();
        }
    } catch (error) {
        // 如果還是噴網路錯誤，這行會把真正的原因抓出來
        alert('發送失敗原因：' + error.message);
        resetButton();
    }
}
        function resetButton() {
            document.getElementById('checkin-btn').disabled = false;
            document.getElementById('checkin-btn').style.backgroundColor = '#06C755';
            document.getElementById('checkin-btn').innerText = '確認簽到';
        }

        // 確保網頁載入後啟動
        window.onload = function() {
            initLIFF();
        };
    </script>
</body>
</html>
